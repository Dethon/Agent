# =============================================================================
# ok_nabu — SPANISH pass, half 1/2 of a two-pass accent-matched wake-word config
# (VoxCPM2 TTS, voice design)
# =============================================================================
#
# Install:   uv sync --extra train --extra voxcpm  (or the pinned-package form — see
#            ../README.md "Install" for both).
# Prefetch:  livekit-wakeword setup --config ok_nabu_es.yaml
# Pipeline:  see ../README.md "Runbook" — this config is run stage-by-stage
#            (generate → [ok_nabu_en.yaml generate] → inject recordings → augment
#            → train → export → onnxsim → eval), NEVER via `run`.
#
# Cloned from livekit-wakeword's configs/prod_voxcpm.yaml (pinned commit 60b5d755) and
# adapted for our household's Spanish-style "okey nabu" ("o-KEY NA-bu", keep the /y/, no
# internal pause) wake phrase — validated by ear in the Task 5 listening pass.
#
# TWO-PASS ACCENT-MATCHED DESIGN. VoxCPM synthesis needs accent-matched spellings: Spanish
# voices read Spanish spellings correctly, English voices read English-native spellings
# correctly — mixing them mangles the phrase (a Spanish voice reading "okay naboo" or an
# English voice reading "okei nabu" sounds wrong). VoxCPM's generate stage pairs clip index
# i with target_phrases[i % nPhrases] and the (persona, cfg, steps) triple with
# flat[i % (nPersonas*nCfg*nSteps)] INDEPENDENTLY — so phrase and persona are decoupled per
# clip, and there is no way to force "Spanish persona only reads Spanish phrase" within a
# single generate call. The fix is two separate `generate` invocations sharing the SAME
# model_name (hence the SAME output/ok_nabu/ directory): this file (ok_nabu_es.yaml) generates
# the first half with Spanish target_phrases + Castilian-Spanish personas, and
# ok_nabu_en.yaml resumes generation into the same split directories with English
# target_phrases + English personas, filling out the second half. Every clip is thus
# synthesized by a persona that can actually pronounce the phrase text it was paired with.
# The clip-level phrase/persona pairing math is unaffected by this split — only which
# phrase/persona POOL is active during each pass.
#
# Validated phrase lists (Task 5 listening pass — replaces the earlier PROVISIONAL spellings):
#   Spanish pass (this file):  "okey nabu", "okey-nabu", "okeynabu", "okei nabu"
#   English pass (ok_nabu_en.yaml): "okay naboo", "okay nabu", "okey naboo", "okay nahboo"
#
# FAST/FLUID PACING ONLY. The listening pass found that "pausado/lento/mesurado/slow/
# measured/deliberate" persona pacing caused VoxCPM to render a long internal pause inside
# the phrase (breaking "okey nabu" into two disconnected words) — the root-cause bug behind
# the earlier single-pass config. Every persona below (and in ok_nabu_en.yaml) is written
# with brisk/fluid/conversational pacing only; do not reintroduce slow-pacing wording.
#
# model.model_type: conv_attention is validated against tract 0.23 by the Task 1 gate test
# (satellite/tests/tract_clf_compat.rs) — but ONLY after running onnxsim on the export; see
# ../README.md "Mandatory post-export step". Every ONNX this config produces needs it.
#
# Schema:    WakeWordConfig in src/livekit/wakeword/config.py
# =============================================================================

# -----------------------------------------------------------------------------
# model_name (required)
# -----------------------------------------------------------------------------
# Used for output/<model_name>/, checkpoint basename, and exported ONNX filename.
#
# SAME NAME as ok_nabu_en.yaml, deliberately — that shared model_name is what makes the
# two generate passes land in the same output/ok_nabu/ split directories and merge into
# one dataset before augment/train/export/eval (which are only ever run once, against
# ok_nabu_en.yaml, after both passes complete).

model_name: ok_nabu

# -----------------------------------------------------------------------------
# target_phrases (required)
# -----------------------------------------------------------------------------
# Exact phrases to synthesize as positives and to defend against via adversarial
# negatives. Include spelling variants users might say.
#
# Validated Castilian-Spanish spellings of "okey nabu" (Task 5 listening pass).

target_phrases:
  - "okey nabu"
  - "okey-nabu"
  - "okeynabu"
  - "okei nabu"

# =============================================================================
# Data generation (top-level)
# =============================================================================

# tts_backend — Synthetic speech engine for clip generation.
#   piper_vits — VITS + SLERP (904 speakers); uses piper_tts + noise_* / slerp_* below.
#   voxcpm     — VoxCPM2 voice-design TTS; uses voxcpm_tts below. Prefer this backend for
#                multilingual wake words (phrases in target language; no extra language field).
tts_backend: voxcpm

# n_samples / n_samples_val / n_background_samples / n_background_samples_val — HALF of the
# ok_nabu_en.yaml totals (12500/2500/1000/250 vs. 25000/5000/2000/500). This pass fills
# indices 0..n-1 of each split; the English pass (ok_nabu_en.yaml) resumes from the existing
# clip count and generates up to the FULL totals, appending indices n..(full-1). See
# ../README.md "Runbook" for the exact resume mechanics.
n_samples: 12500
n_samples_val: 2500
n_background_samples: 1000
n_background_samples_val: 250

# tts_batch_size — Piper: GPU batch size for VITS. VoxCPM: ignored (sequential synthesis).
tts_batch_size: 50

# custom_negative_phrases — Extra adversarial phrases (in addition to auto phoneme edits).
# Spanish near-misses/partials of "okey nabu", since VoxCPM's auto adversarial negatives are
# English/CMUdict-biased and can't be relied on for Spanish coverage. A couple of English-mix
# phrases are kept for households that sometimes address the device in English. This is the
# SAME negative list as the earlier single-pass ok_nabu_medium.yaml (superseded) — carried
# over verbatim since it's still valid near-miss coverage for the Spanish spellings.
custom_negative_phrases:
  - "ok"
  - "okay"
  - "nabu"
  - "el nabo"
  - "un nabo"
  - "ok nada"
  - "ok vamos"
  - "ok bueno"
  - "o cabo"
  - "ok pavo"
  - "ok guapo"
  - "está bueno"
  - "que apuro"
  - "hey nabu"
  - "oh nabu"
  - "ok tabu"
  - "ok mambo"
  - "okay now boo"
  - "okay nope"

# -----------------------------------------------------------------------------
# Piper-only TTS controls (ignored when tts_backend is voxcpm; kept for schema parity)
# -----------------------------------------------------------------------------
# noise_scales       — VITS decoder noise (overall variability).
# noise_scale_ws     — VITS duration noise.
# length_scales      — Speaking-rate multipliers.
# slerp_weights      — Speaker-blend weights for SLERP pairs.
# max_speakers       — Cap Piper speaker IDs (null = all 904).
noise_scales: [0.98]
noise_scale_ws: [0.98]
length_scales: [0.75, 1.0, 1.25]
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]
# max_speakers: null

# -----------------------------------------------------------------------------
# piper_tts — Piper checkpoint layout (only used when tts_backend is piper_vits)
# -----------------------------------------------------------------------------
# checkpoint_relpath — Path to en-us-libritts-high.pt relative to data_dir; JSON beside it.
piper_tts:
  checkpoint_relpath: piper/en-us-libritts-high.pt

# -----------------------------------------------------------------------------
# voxcpm_tts — VoxCPM2 settings (only used when tts_backend is voxcpm)
# -----------------------------------------------------------------------------
# model_id             — Hugging Face repo id for `setup` snapshot_download.
# model_cache_relpath  — Directory under data_dir for the snapshot (default voxcpm/VoxCPM2).
# local_model_path     — Optional: absolute path or path relative to data_dir with weights.
#                        If set and directory is non-empty, setup skips download.
# load_denoiser        — Pass-through to VoxCPM.from_pretrained (heavier load if true).
# voice_design_prompts — Text personas; clip index cycles (prompt × cfg × timesteps).
# cfg_values           — Classifier-free guidance scales per clip (higher = stronger conditioning).
# inference_timesteps_list — Diffusion denoising steps at inference (more = slower, often cleaner).
voxcpm_tts:
  model_id: openbmb/VoxCPM2
  model_cache_relpath: voxcpm/VoxCPM2
  local_model_path: null
  load_denoiser: false
  cfg_values: [1.5, 2.0, 2.5, 3.0]
  inference_timesteps_list: [8, 10, 12]
  # Castilian-Spanish speaker personas (varied age/gender/pitch/timbre/accent), rewritten from
  # the earlier ok_nabu_medium.yaml Spanish persona list with every slow-pacing word
  # ("ritmo pausado/lento/mesurado", "lenta", "deliberado") replaced by fast/fluid pacing
  # ("ritmo rápido/ágil/natural/conversacional/fluido") — see the header note on the
  # slow-pacing internal-pause bug this fixes.
  voice_design_prompts:
    - "Una mujer joven, voz clara de tono medio, ritmo rápido y natural, tranquila y profesional"
    - "Un hombre joven, barítono cálido, ritmo ágil y constante, amable y articulado"
    - "Una mujer de mediana edad, tono ligeramente grave, ritmo fluido, tono seguro"
    - "Un hombre de mediana edad, voz grave y resonante, ritmo rápido y directo"
    - "Una mujer mayor, voz suave y amable, ritmo natural y ágil, tono cariñoso"
    - "Un hombre mayor, tenor áspero, ritmo vivo, tono directo"
    - "Una mujer joven, tono enérgico y luminoso, ritmo rápido"
    - "Un hombre joven, tenor ligero, ritmo conversacional rápido"
    - "Una mujer de unos treinta años, voz de alto suave, acento castellano neutro, ritmo ágil y uniforme"
    - "Un hombre de unos treinta años, barítono claro, ritmo rápido y resuelto"
    - "Una voz de tono más agudo, entusiasta y animada, ritmo rápido"
    - "Una persona joven adulta, entrega de género neutro, volumen suave, articulación ágil"
    - "Una voz de presentador segura, proyección fuerte, ritmo rápido"
    - "Una voz estilo presentador de telediario, con autoridad, ritmo fluido y natural"
    - "Un tono amable de atención al cliente, con una leve sonrisa en la voz, ritmo ágil"
    - "Una voz alegre y animada, amplio rango de tono, ritmo vivo y rápido"
    - "Un acento andaluz, tono cálido, ritmo conversacional rápido"
    - "Un acento castellano de Madrid, dicción clara, ritmo ágil"

# =============================================================================
# Paths
# =============================================================================

# data_dir  — Root for downloads (setup), backgrounds, RIRs, VoxCPM snapshot, Piper if used.
data_dir: ./data

# output_dir — Root for generated clips, features, checkpoints, exports (per model_name).
output_dir: ./output

# =============================================================================
# augmentation (AugmentationConfig)
# =============================================================================
# clip_duration    — Seconds; fixed window for embedding pipeline (default 2.0 matches ONNX head).
# batch_size       — Augmentation batch size.
# rounds           — Augmentation passes per sample (more = stronger regularization, slower).
# background_paths — Dirs of raw noise (MUSAN subset from setup).
# rir_paths        — Room impulse response dirs (from setup).

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 3
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

# =============================================================================
# model (ModelConfig)
# =============================================================================
# model_type — dnn | rnn | conv_attention
# model_size — tiny | small | medium | large  (layer width × depth presets)

model:
  model_type: conv_attention
  model_size: medium

# =============================================================================
# Training
# =============================================================================
# steps                 — Phase-1 step budget (trainer uses multi-phase schedule).
# learning_rate         — AdamW base LR.
# weight_decay          — AdamW L2-style decay.
# label_smoothing       — BCE target smoothing (0–0.1 typical).
# max_negative_weight   — Upper cap for negative-class loss weight ramp.
# target_fp_per_hour    — Validation FPPH target for adaptive weighting / thresholding.
# batch_n_per_class     — Samples per class per training step (keys must match trainer).
#
# Training is only ever driven through ok_nabu_en.yaml (the pass that completes the full
# dataset) — these values are kept here, identical, purely so this file stays a complete,
# independently-valid config (e.g. for `setup`/`generate` in isolation).

steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50