# =============================================================================
# ok_nabu — ENGLISH pass, half 2/2 of a two-pass accent-matched wake-word config
# (VoxCPM2 TTS, voice design)
# =============================================================================
#
# Install:   uv sync --extra train --extra voxcpm  (or the pinned-package form — see
#            ../README.md "Install" for both).
# Prefetch:  setup was already run against ok_nabu_es.yaml (same data_dir) — re-running
#            against this file is harmless (setup short-circuits once artifacts exist).
# Pipeline:  see ../README.md "Runbook" — this is the config used for every stage AFTER
#            the two generate passes (augment → train → export → onnxsim → eval); it is
#            never run via `run` (single end-to-end command), only stage-by-stage.
#
# Cloned from livekit-wakeword's configs/prod_voxcpm.yaml (pinned commit 60b5d755). See
# ok_nabu_es.yaml's header for the full rationale of the two-pass accent-matched design —
# summary: VoxCPM's generate stage pairs clip index i with target_phrases[i % nPhrases] and
# the (persona, cfg, steps) triple independently, so accent-matched phrase/persona pairing
# requires two separate generate calls into the SAME model_name/output directory. This file
# is the SECOND pass: it shares model_name: ok_nabu with ok_nabu_es.yaml (which already
# generated the first half using Spanish target_phrases + Castilian-Spanish personas) and,
# because n_samples/n_samples_val/n_background_samples/n_background_samples_val here are
# the FULL totals (not half), running `generate` against this file RESUMES each split
# directory from its existing clip count and appends English-phrase/English-persona clips
# up to the full totals — see ../README.md "Runbook" for the exact resume mechanics
# (start_index = existing clip count, from livekit_wakeword's own run_generate).
#
# Validated phrase lists (Task 5 listening pass — replaces the earlier PROVISIONAL spellings):
#   Spanish pass (ok_nabu_es.yaml):  "okey nabu", "okey-nabu", "okeynabu", "okei nabu"
#   English pass (this file):        "okay naboo", "okay nabu", "okey naboo", "okay nahboo"
#
# FAST/FLUID PACING ONLY. The listening pass found that "pausado/lento/mesurado/slow/
# measured/deliberate" persona pacing caused VoxCPM to render a long internal pause inside
# the phrase (breaking the wake word into two disconnected words) — the root-cause bug
# behind the earlier single-pass config. Every persona below (and in ok_nabu_es.yaml) is
# written with brisk/fluid/conversational pacing only; do not reintroduce slow-pacing
# wording.
#
# model.model_type: conv_attention is validated against tract 0.23 by the Task 1 gate test
# (satellite/tests/tract_clf_compat.rs) — but ONLY after running onnxsim on the export; see
# ../README.md "Mandatory post-export step". Every ONNX this config produces needs it.
#
# Schema:    WakeWordConfig in src/livekit/wakeword/config.py
# =============================================================================

# -----------------------------------------------------------------------------
# model_name (required)
# -----------------------------------------------------------------------------
# Used for output/<model_name>/, checkpoint basename, and exported ONNX filename.
#
# SAME NAME as ok_nabu_es.yaml, deliberately — see that file's header. This is the
# config used for augment/train/export/eval (run once, after both generate passes).

model_name: ok_nabu

# -----------------------------------------------------------------------------
# target_phrases (required)
# -----------------------------------------------------------------------------
# Exact phrases to synthesize as positives and to defend against via adversarial
# negatives. Include spelling variants users might say.
#
# Validated English-native spellings of "okey nabu" as an English voice renders it
# (Task 5 listening pass) — NOT the Spanish spellings; an English VoxCPM persona reading
# "okei nabu" mangles the phrase, hence the separate English-native spelling set.

target_phrases:
  - "okay naboo"
  - "okay nabu"
  - "okey naboo"
  - "okay nahboo"

# =============================================================================
# Data generation (top-level)
# =============================================================================

# tts_backend — Synthetic speech engine for clip generation.
#   piper_vits — VITS + SLERP (904 speakers); uses piper_tts + noise_* / slerp_* below.
#   voxcpm     — VoxCPM2 voice-design TTS; uses voxcpm_tts below. Prefer this backend for
#                multilingual wake words (phrases in target language; no extra language field).
tts_backend: voxcpm

# n_samples / n_samples_val / n_background_samples / n_background_samples_val — FULL totals
# (matches upstream prod_voxcpm.yaml). ok_nabu_es.yaml already generated the first half
# (12500/2500/1000/250) with Spanish phrases/personas; `generate` against THIS file resumes
# each split from its existing clip count and appends English-phrase/English-persona clips
# up to these full totals. See ../README.md "Runbook".
n_samples: 25000
n_samples_val: 5000
n_background_samples: 2000
n_background_samples_val: 500

# tts_batch_size — Piper: GPU batch size for VITS. VoxCPM: ignored (sequential synthesis).
tts_batch_size: 50

# custom_negative_phrases — Extra adversarial phrases (in addition to auto phoneme edits).
# English near-misses/partials of "okay naboo", since the negative splits also resume/append
# in this pass (from ok_nabu_es.yaml's Spanish-negative clip count up to the full totals
# above) — VoxCPM's own auto adversarial negatives (CMUdict-biased) already cover English
# phonetic neighbors reasonably well, but these hand-picked ones target the specific
# "okay/okey X naboo/nabu/nahboo" confusion space.
custom_negative_phrases:
  - "okay"
  - "naboo"
  - "okay no"
  - "okay boo"
  - "okay move"
  - "okay now"
  - "hey naboo"
  - "a boo"
  - "okay cool"
  - "okey dokey"
  - "nabu"
  - "knob you"
  - "nah boo"

# -----------------------------------------------------------------------------
# Piper-only TTS controls (ignored when tts_backend is voxcpm; kept for schema parity)
# -----------------------------------------------------------------------------
# noise_scales       — VITS decoder noise (overall variability).
# noise_scale_ws     — VITS duration noise.
# length_scales      — Speaking-rate multipliers.
# slerp_weights      — Speaker-blend weights for SLERP pairs.
# max_speakers       — Cap Piper speaker IDs (null = all 904).
noise_scales: [0.98]
noise_scale_ws: [0.98]
length_scales: [0.75, 1.0, 1.25]
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]
# max_speakers: null

# -----------------------------------------------------------------------------
# piper_tts — Piper checkpoint layout (only used when tts_backend is piper_vits)
# -----------------------------------------------------------------------------
# checkpoint_relpath — Path to en-us-libritts-high.pt relative to data_dir; JSON beside it.
piper_tts:
  checkpoint_relpath: piper/en-us-libritts-high.pt

# -----------------------------------------------------------------------------
# voxcpm_tts — VoxCPM2 settings (only used when tts_backend is voxcpm)
# -----------------------------------------------------------------------------
# model_id             — Hugging Face repo id for `setup` snapshot_download.
# model_cache_relpath  — Directory under data_dir for the snapshot (default voxcpm/VoxCPM2).
# local_model_path     — Optional: absolute path or path relative to data_dir with weights.
#                        If set and directory is non-empty, setup skips download.
# load_denoiser        — Pass-through to VoxCPM.from_pretrained (heavier load if true).
# voice_design_prompts — Text personas; clip index cycles (prompt × cfg × timesteps).
# cfg_values           — Classifier-free guidance scales per clip (higher = stronger conditioning).
# inference_timesteps_list — Diffusion denoising steps at inference (more = slower, often cleaner).
voxcpm_tts:
  model_id: openbmb/VoxCPM2
  model_cache_relpath: voxcpm/VoxCPM2
  local_model_path: null
  load_denoiser: false
  cfg_values: [1.5, 2.0, 2.5, 3.0]
  inference_timesteps_list: [8, 10, 12]
  # English speaker personas (varied age/gender/pitch/timbre/accent incl. American/British/
  # Southern), rewritten from upstream prod_voxcpm.yaml's 34-persona list into a fast-paced
  # subset of ~18 with every slow-pacing word ("slow", "measured", "deliberate", "slower",
  # "medium-slow") replaced by brisk/fluid pacing — see the header note on the slow-pacing
  # internal-pause bug this fixes.
  voice_design_prompts:
    - "A young adult woman, clear mid-pitch voice, brisk natural pace, calm and professional"
    - "A young adult man, warm baritone, steady brisk pace, friendly and articulate"
    - "A middle-aged woman, slightly low pitch, quick fluid pace, confident tone"
    - "A middle-aged man, deep resonant voice, fast direct pace"
    - "An older adult man, gravelly tenor, brisk pace, matter-of-fact"
    - "A young woman, bright energetic tone, fast pace"
    - "A young man, light tenor, quick conversational pace"
    - "A woman in her thirties, smooth alto, neutral American accent, even brisk pace"
    - "A man in his thirties, clear baritone, businesslike brisk pace"
    - "A speaker with a higher pitch, enthusiastic and upbeat, medium-fast pace"
    - "A confident presenter voice, strong projection, quick pace"
    - "A news-anchor style voice, authoritative, brisk rhythm"
    - "A friendly customer-service tone, slightly smiling, quick pace"
    - "A cheerful animated voice, wide pitch range, lively fast pace"
    - "A Southern US English accent, warm tone, brisk conversational pace"
    - "A British English accent, clear RP-like delivery, brisk pace"
    - "A speaker with slight vocal fry, casual young adult, quick pace"
    - "A crisp precise voice, minimal accent, fast clear speech"

# =============================================================================
# Paths
# =============================================================================

# data_dir  — Root for downloads (setup), backgrounds, RIRs, VoxCPM snapshot, Piper if used.
data_dir: ./data

# output_dir — Root for generated clips, features, checkpoints, exports (per model_name).
output_dir: ./output

# =============================================================================
# augmentation (AugmentationConfig)
# =============================================================================
# clip_duration    — Seconds; fixed window for embedding pipeline (default 2.0 matches ONNX head).
# batch_size       — Augmentation batch size.
# rounds           — Augmentation passes per sample (more = stronger regularization, slower).
# background_paths — Dirs of raw noise (MUSAN subset from setup).
# rir_paths        — Room impulse response dirs (from setup).

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 3
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

# =============================================================================
# model (ModelConfig)
# =============================================================================
# model_type — dnn | rnn | conv_attention
# model_size — tiny | small | medium | large  (layer width × depth presets)

model:
  model_type: conv_attention
  model_size: medium

# =============================================================================
# Training
# =============================================================================
# steps                 — Phase-1 step budget (trainer uses multi-phase schedule).
# learning_rate         — AdamW base LR.
# weight_decay          — AdamW L2-style decay.
# label_smoothing       — BCE target smoothing (0–0.1 typical).
# max_negative_weight   — Upper cap for negative-class loss weight ramp.
# target_fp_per_hour    — Validation FPPH target for adaptive weighting / thresholding.
# batch_n_per_class     — Samples per class per training step (keys must match trainer).

steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50