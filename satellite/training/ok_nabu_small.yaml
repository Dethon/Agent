# =============================================================================
# ok_nabu — production-scale wake-word config (VoxCPM2 TTS, voice design)
# =============================================================================
#
# Install:   uv sync --extra train --extra voxcpm  (or the pinned-package form — see
#            ../README.md "Install" for both).
# Prefetch:  livekit-wakeword setup --config <this-config>.yaml
# Pipeline:  livekit-wakeword run <this-config>.yaml
#
# Cloned verbatim from livekit-wakeword's configs/prod_voxcpm.yaml (pinned commit 60b5d755)
# and adapted for our household's Spanish-style "ok nabu" ("o-ké ná-bu") wake phrase.
# Multilingual wake words require tts_backend: voxcpm (Piper is English-US only), so this
# config uses VoxCPM2 for every generated clip — target_phrases and custom_negative_phrases
# are Spanish, and voice_design_prompts are localized to Castilian-Spanish personas. VoxCPM's
# auto adversarial negatives are English/CMUdict-biased, so the near-miss negatives below are
# hand-written rather than relying on that machinery for Spanish coverage.
#
# target_phrases are PROVISIONAL — not yet validated by ear (VoxCPM2 wasn't downloaded when
# this config was authored). Before the full run, do the listening pass described in
# ../README.md ("Before the full run: generate and listen") and fix the spellings there first.
#
# model.model_type: conv_attention is validated against tract 0.23 by the Task 1 gate test
# (satellite/tests/tract_clf_compat.rs) — but ONLY after running onnxsim on the export; see
# ../README.md "Mandatory post-export step". Every ONNX this config produces needs it.
#
# Schema:    WakeWordConfig in src/livekit/wakeword/config.py
# =============================================================================

# -----------------------------------------------------------------------------
# model_name (required)
# -----------------------------------------------------------------------------
# Used for output/<model_name>/, checkpoint basename, and exported ONNX filename.

model_name: ok_nabu_small

# -----------------------------------------------------------------------------
# target_phrases (required)
# -----------------------------------------------------------------------------
# Exact phrases to synthesize as positives and to defend against via adversarial
# negatives. Include spelling variants users might say.
#
# PROVISIONAL — Spanish spelling variants of "ok nabu" as a Castilian speaker would say/write
# it (best guess). NOT yet confirmed by ear. Fix this list during the Task 5 setup listening
# pass (README "Before the full run") before committing to the full-scale run.

target_phrases:
  - "ok nabu"
  - "oké nabu"
  - "okay nabu"
  - "okey nabu"

# =============================================================================
# Data generation (top-level)
# =============================================================================

# tts_backend — Synthetic speech engine for clip generation.
#   piper_vits — VITS + SLERP (904 speakers); uses piper_tts + noise_* / slerp_* below.
#   voxcpm     — VoxCPM2 voice-design TTS; uses voxcpm_tts below. Prefer this backend for
#                multilingual wake words (phrases in target language; no extra language field).
tts_backend: voxcpm

# n_samples — Training clips per synthetic class (positive + adversarial negative).
# Each class gets this many clips before augmentation rounds multiply variants.
n_samples: 25000

# n_samples_val — Validation clips per synthetic class (~10–20% of n_samples).
n_samples_val: 5000

# n_background_samples / n_background_samples_val — Count of tiled background-noise clips.
n_background_samples: 2000
n_background_samples_val: 500

# tts_batch_size — Piper: GPU batch size for VITS. VoxCPM: ignored (sequential synthesis).
tts_batch_size: 50

# custom_negative_phrases — Extra adversarial phrases (in addition to auto phoneme edits).
# Spanish near-misses/partials of "ok nabu", since VoxCPM's auto adversarial negatives are
# English/CMUdict-biased and can't be relied on for Spanish coverage. A couple of English-mix
# phrases are kept for households that sometimes address the device in English.
custom_negative_phrases:
  - "ok"
  - "okay"
  - "nabu"
  - "el nabo"
  - "un nabo"
  - "ok nada"
  - "ok vamos"
  - "ok bueno"
  - "o cabo"
  - "ok pavo"
  - "ok guapo"
  - "está bueno"
  - "que apuro"
  - "hey nabu"
  - "oh nabu"
  - "ok tabu"
  - "ok mambo"
  - "okay now boo"
  - "okay nope"

# -----------------------------------------------------------------------------
# Piper-only TTS controls (ignored when tts_backend is voxcpm; kept for schema parity)
# -----------------------------------------------------------------------------
# noise_scales       — VITS decoder noise (overall variability).
# noise_scale_ws     — VITS duration noise.
# length_scales      — Speaking-rate multipliers.
# slerp_weights      — Speaker-blend weights for SLERP pairs.
# max_speakers       — Cap Piper speaker IDs (null = all 904).
noise_scales: [0.98]
noise_scale_ws: [0.98]
length_scales: [0.75, 1.0, 1.25]
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]
# max_speakers: null

# -----------------------------------------------------------------------------
# piper_tts — Piper checkpoint layout (only used when tts_backend is piper_vits)
# -----------------------------------------------------------------------------
# checkpoint_relpath — Path to en-us-libritts-high.pt relative to data_dir; JSON beside it.
piper_tts:
  checkpoint_relpath: piper/en-us-libritts-high.pt

# -----------------------------------------------------------------------------
# voxcpm_tts — VoxCPM2 settings (only used when tts_backend is voxcpm)
# -----------------------------------------------------------------------------
# model_id             — Hugging Face repo id for `setup` snapshot_download.
# model_cache_relpath  — Directory under data_dir for the snapshot (default voxcpm/VoxCPM2).
# local_model_path     — Optional: absolute path or path relative to data_dir with weights.
#                        If set and directory is non-empty, setup skips download.
# load_denoiser        — Pass-through to VoxCPM.from_pretrained (heavier load if true).
# voice_design_prompts — Text personas; clip index cycles (prompt × cfg × timesteps).
# cfg_values           — Classifier-free guidance scales per clip (higher = stronger conditioning).
# inference_timesteps_list — Diffusion denoising steps at inference (more = slower, often cleaner).
voxcpm_tts:
  model_id: openbmb/VoxCPM2
  model_cache_relpath: voxcpm/VoxCPM2
  local_model_path: null
  load_denoiser: false
  cfg_values: [1.5, 2.0, 2.5, 3.0]
  inference_timesteps_list: [8, 10, 12]
  # Localized to Castilian-Spanish speaker personas (varied age/gender/pitch/pace), mirroring
  # upstream's English persona list one-for-one so the same voice-space diversity is covered.
  voice_design_prompts:
    - "Una mujer joven, voz clara de tono medio, ritmo pausado, tranquila y profesional"
    - "Un hombre joven, barítono cálido, ritmo constante, amable y articulado"
    - "Una mujer de mediana edad, tono ligeramente grave, ritmo mesurado, tono seguro"
    - "Un hombre de mediana edad, voz grave y resonante, ritmo lento y deliberado"
    - "Una mujer mayor, voz suave y amable, ritmo más lento, tono cariñoso"
    - "Un hombre mayor, tenor áspero, ritmo moderado, tono directo"
    - "Una mujer joven, tono enérgico y luminoso, ritmo algo más rápido"
    - "Un hombre joven, tenor ligero, ritmo conversacional rápido"
    - "Una mujer de unos treinta años, voz de alto suave, acento castellano neutro, ritmo uniforme"
    - "Un hombre de unos treinta años, barítono claro, ritmo formal"
    - "Una voz de tono más agudo, entusiasta y animada, ritmo medio-rápido"
    - "Una voz de tono más grave, relajada y tranquila, ritmo más lento"
    - "Una persona joven adulta, entrega de género neutro, volumen suave, articulación cuidadosa"
    - "Una voz de presentador segura, proyección fuerte, ritmo moderado"
    - "Una voz íntima y tranquila, sensación de cercanía, lenta y clara"
    - "Una voz estilo presentador de telediario, con autoridad, ritmo uniforme"
    - "Un tono amable de atención al cliente, con una leve sonrisa en la voz, ritmo medio"
    - "Una voz cansada pero clara, energía baja, ritmo constante"
    - "Una voz alegre y animada, amplio rango de tono, ritmo vivo"
    - "Una voz seria y formal, mínima emoción, articulación precisa"
    - "Un acento andaluz, tono cálido, ritmo conversacional"
    - "Un acento castellano de Madrid, dicción clara, ritmo moderado"
    - "Una voz con ligera fritura vocal, joven y desenfadada, ritmo medio"
    - "Una voz muy suave y pulida, calidad de estudio, ritmo lento a medio"
    - "Un tono nasal y brillante, enérgico, ritmo más rápido de lo habitual"
    - "Una voz suave y entrecortada, gentil, ritmo más lento"
    - "Una voz robusta y atlética, fuerte y directa, ritmo medio"
    - "Un tono académico, pausas reflexivas, ritmo lento y estudiado"
    - "Una voz adolescente, casual, algo rápida, tono agudo"
    - "Una voz ejecutiva madura, dinámica controlada y grave, ritmo constante"
    - "Un tono cantarín y juguetón, tono variado, ritmo medio"
    - "Una entrega monótona y plana, claridad robótica, velocidad uniforme"
    - "Una voz ronca, energía baja, ritmo medio-lento"
    - "Una voz precisa y nítida, acento neutro, habla rápida y clara"

# =============================================================================
# Paths
# =============================================================================

# data_dir  — Root for downloads (setup), backgrounds, RIRs, VoxCPM snapshot, Piper if used.
data_dir: ./data

# output_dir — Root for generated clips, features, checkpoints, exports (per model_name).
output_dir: ./output

# =============================================================================
# augmentation (AugmentationConfig)
# =============================================================================
# clip_duration    — Seconds; fixed window for embedding pipeline (default 2.0 matches ONNX head).
# batch_size       — Augmentation batch size.
# rounds           — Augmentation passes per sample (more = stronger regularization, slower).
# background_paths — Dirs of raw noise (MUSAN subset from setup).
# rir_paths        — Room impulse response dirs (from setup).

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 3
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

# =============================================================================
# model (ModelConfig)
# =============================================================================
# model_type — dnn | rnn | conv_attention
# model_size — tiny | small | medium | large  (layer width × depth presets)

model:
  model_type: conv_attention
  model_size: small

# =============================================================================
# Training
# =============================================================================
# steps                 — Phase-1 step budget (trainer uses multi-phase schedule).
# learning_rate         — AdamW base LR.
# weight_decay          — AdamW L2-style decay.
# label_smoothing       — BCE target smoothing (0–0.1 typical).
# max_negative_weight   — Upper cap for negative-class loss weight ramp.
# target_fp_per_hour    — Validation FPPH target for adaptive weighting / thresholding.
# batch_n_per_class     — Samples per class per training step (keys must match trainer).

steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50
