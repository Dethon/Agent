name: jackbot

# Single source of truth for the agent's operating timezone (applied to the two
# containers that surface time to the LLM / fire schedules).
x-timezone: &timezone
  TZ: Europe/Madrid

services:
  redis:
    image: redis/redis-stack-server:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis_data:/data
    environment:
      <<: *timezone
      REDIS_ARGS: "--appendonly yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jackbot

  qbittorrent:
    image: qbittorrentofficial/qbittorrent-nox:5.1.2-2
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: qbittorrent
    ports:
      - "8001:8001"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./volumes/qbittorrent_config:/config
      - ${DATA_PATH:-./volumes/data}/downloads:/downloads
    environment:
      <<: *timezone
      PUID: ${PUID:-1654}
      PGID: ${PGID:-1654}
      QBT_LEGAL_NOTICE: confirm
      QBT_VERSION: 5.1.2-2
      QBT_TORRENTING_PORT: 6881
      QBT_WEBUI_PORT: 8001
      UMASK: "002"
    stop_grace_period: 30m
    restart: unless-stopped
    networks:
      - jackbot

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: homeassistant
    ports:
      - "8123:8123"
    volumes:
      - ./volumes/homeassistant_config:/config
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: music-assistant
    ports:
      - "8095:8095"     # web UI + API/websocket (HA Music Assistant integration target)
      - "1704:1704"     # snapcast stream  (satellite snapclients connect here)
      - "1705:1705"     # snapcast control
      - "1780:1780"     # snapcast web
    volumes:
      - music-assistant-data:/data
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  filebrowser:
    image: filebrowser/filebrowser:v2
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: filebrowser
    user: ${PUID:-1654}:${PGID:-1654}
    ports:
      - "8002:80"
    volumes:
      - ${DATA_PATH:-./volumes/data}:/srv
      - ./volumes/filebrowser_database:/database
      - ./volumes/filebrowser_config:/config
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  jackett:
    image: lscr.io/linuxserver/jackett:0.24.306
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    container_name: jackett
    ports:
      - "8003:9117"
    volumes:
      - ./volumes/jackett_config:/config
      - ./volumes/jackett_data/downloads:/downloads
    environment:
      <<: *timezone
      PUID: ${PUID:-1654}
      PGID: ${PGID:-1654}
      UMASK: "022"
    restart: unless-stopped
    networks:
      - jackbot
        #    depends_on:
        #      - flaresolverr

  #  flaresolverr:
  #    image: ghcr.io/flaresolverr/flaresolverr:latest
  #    logging:
  #      options:
  #        max-size: "5m"
  #        max-file: "3"
  #    container_name: flaresolverr
  #    environment:
  #      - LOG_LEVEL=info
  #      - LOG_HTML=false
  #      - CAPTCHA_SOLVER=none
  #    ports:
  #      - "8191:8191"
  #    networks:
  #      - jackbot
  #    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:1.42.1
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: plex
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./volumes/plex_config:/config
      - ${DATA_PATH:-./volumes/data}:/media
    environment:
      <<: *timezone
      PUID: ${PUID:-1654}
      PGID: ${PGID:-1654}
      VERSION: docker
    restart: unless-stopped

  base-sdk:
    image: base-sdk:latest
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Dockerfile.base-sdk
      cache_from:
        - base-sdk:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
      labels:
        keep: "true"
    entrypoint: ["true"]
    environment:
      <<: *timezone
    restart: "no"
    networks:
      - jackbot

  mcp-library:
    image: mcp-library:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-library
    ports:
      - "6001:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerLibrary/Dockerfile
      cache_from:
        - mcp-library:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    volumes:
      - ${DATA_PATH:-./volumes/data}:/media
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      qbittorrent:
        condition: service_started
      jackett:
        condition: service_started
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-vault:
    image: mcp-vault:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-vault
    ports:
      - "6002:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerVault/Dockerfile
      cache_from:
        - mcp-vault:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    volumes:
      - ${VAULT_PATH:-./volumes/vault}:/vault
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-sandbox:
    image: mcp-sandbox:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-sandbox
    ports:
      - "6004:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerSandbox/Dockerfile
      cache_from:
        - mcp-sandbox:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    devices:
      - /dev/dri:/dev/dri
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    volumes:
      - ${SANDBOX_HOME_PATH:-./volumes/sandbox}:/home/sandbox_user
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
      HOME: /home/sandbox_user
      PATH: /home/sandbox_user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    networks:
      - jackbot
    depends_on:
      - base-sdk

  camoufox:
    image: camoufox:latest
    build:
      context: ./camoufox
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: camoufox
    ports:
      - "9377:9377"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9377/json"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  mcp-websearch:
    image: mcp-websearch:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-websearch
    ports:
      - "6003:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerWebSearch/Dockerfile
      cache_from:
        - mcp-websearch:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      camoufox:
        condition: service_healthy
      base-sdk:
        condition: service_started

  mcp-idealista:
    image: mcp-idealista:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-idealista
    ports:
      - "6005:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerIdealista/Dockerfile
      cache_from:
        - mcp-idealista:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-homeassistant:
    image: mcp-homeassistant:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-homeassistant
    ports:
      - "6006:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerHomeAssistant/Dockerfile
      cache_from:
        - mcp-homeassistant:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      homeassistant:
        condition: service_started

  mcp-channel-signalr:
    image: mcp-channel-signalr:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-signalr
    ports:
      - "6010:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelSignalR/Dockerfile
      cache_from:
        - mcp-channel-signalr:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-channel-telegram:
    image: mcp-channel-telegram:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-telegram
    ports:
      - "6011:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelTelegram/Dockerfile
      cache_from:
        - mcp-channel-telegram:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-channel-servicebus:
    image: mcp-channel-servicebus:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-servicebus
    ports:
      - "6012:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelServiceBus/Dockerfile
      cache_from:
        - mcp-channel-servicebus:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-scheduling:
    image: mcp-scheduling:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-scheduling
    ports:
      - "6013:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerScheduling/Dockerfile
      cache_from:
        - mcp-scheduling:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-printer:
    image: mcp-printer:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-printer
    ports:
      - "6014:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerPrinter/Dockerfile
      cache_from:
        - mcp-printer:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    volumes:
      - printer-spool:/spool
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started

  mcp-channel-voice:
    image: mcp-channel-voice:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-voice
    ports:
      - "6015:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelVoice/Dockerfile
      cache_from:
        - mcp-channel-voice:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
      Announce__Escalation__WebhookUrl: ""
      Stt__OpenAi__Model: ${STT_MODEL:-Whisper-Medium}
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy
      mcp-lemonade:
        condition: service_healthy

  mcp-lemonade:
    image: mcp-lemonade:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-lemonade
    build: ./lemonade
    ports:
      - "13305:13305"
    environment:
      <<: *timezone
      STT_BACKEND: ${STT_BACKEND:-gpu}
      # Decode-quality knobs, passed through only when set (defaults — VAD 0.6, beam 5,
      # Castilian initial prompt — live in lemonade/entrypoint.sh; set one empty in .env to
      # disable it). The NPU/flm tier ignores all three.
      STT_VAD_THRESHOLD:
      STT_INITIAL_PROMPT:
      STT_BEAM_SIZE:
    # Vulkan whisper on the Ryzen AI iGPU. Kokoro TTS is CPU-only on Linux, so it never
    # contends with whisper for the iGPU.
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    # /dev/dri/renderD* and /dev/kfd are root:render 0660 on Ubuntu/Debian, and --device
    # preserves host ownership. UID 10001 is in no such group, so without this the render
    # node is EACCES, ggml-vulkan enumerates zero devices, and whisper silently decodes on
    # CPU. Set RENDER_GID from the target host: getent group render | cut -d: -f3
    group_add:
      - "${RENDER_GID:-993}"
    # v11 runs as unprivileged UID 10001 with HOME=/opt/lemonade — these are the real cache
    # paths. (Pre-v11 /root/.cache/* mounts are silently dead: the server still runs but
    # writes land in the container layer and every model re-downloads on recreate.)
    volumes:
      - ./volumes/lemonade-hf-cache:/opt/lemonade/.cache/huggingface
      - ./volumes/lemonade-recipe:/opt/lemonade/.cache/lemonade
      - ./volumes/lemonade-llama:/opt/lemonade/llama
    # Healthy = the server answers; the entrypoint's model pre-pull is best-effort and not
    # gated on. start_period covers slow first boots without counting against retries.
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:13305/api/v1/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - jackbot

  agent:
    image: agent:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: agent
    ports:
      - "5000:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Agent/Dockerfile
      cache_from:
        - agent:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    command: [ "--chat", "Web", "--reasoning" ]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      mcp-library:
        condition: service_started
      mcp-vault:
        condition: service_started
      mcp-sandbox:
        condition: service_started
      mcp-websearch:
        condition: service_started
      mcp-idealista:
        condition: service_started
      mcp-homeassistant:
        condition: service_started
      mcp-channel-signalr:
        condition: service_started
      mcp-channel-telegram:
        condition: service_started
      mcp-channel-servicebus:
        condition: service_started
      mcp-scheduling:
        condition: service_started
      mcp-printer:
        condition: service_started
      mcp-channel-voice:
        condition: service_started
      redis:
        condition: service_healthy
      base-sdk:
        condition: service_started

  webui:
    image: webui:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: webui
    ports:
      - "5001:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: WebChat/Dockerfile
      cache_from:
        - webui:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    env_file:
      - .env
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      - agent
      - base-sdk

  observability:
    image: observability:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: observability
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Observability/Dockerfile
      cache_from:
        - observability:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "5003:8080"
    env_file:
      - .env
    environment:
      <<: *timezone
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jackbot

  caddy:
    build:
      context: ./caddy
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: caddy
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./volumes/caddy_data:/data
      - ./volumes/caddy_config:/config
    environment:
      <<: *timezone
      CF_API_TOKEN: ${CF_API_TOKEN}
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      - webui
      - agent

networks:
  jackbot:

volumes:
  printer-spool:
  music-assistant-data: