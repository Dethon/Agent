name: jackbot

# Single source of truth for the agent's operating timezone (applied to the two
# containers that surface time to the LLM / fire schedules).
x-timezone: &timezone
  TZ: Europe/Madrid

services:
  redis:
    image: redis/redis-stack-server:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis_data:/data
    environment:
      <<: *timezone
      REDIS_ARGS: "--appendonly yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jackbot

  qbittorrent:
    image: qbittorrentofficial/qbittorrent-nox:5.1.2-2
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: qbittorrent
    ports:
      - "8001:8001"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./volumes/qbittorrent_config:/config
      - ${DATA_PATH:-./volumes/data}/downloads:/downloads
    environment:
      <<: *timezone
      PUID: ${PUID:-1654}
      PGID: ${PGID:-1654}
      QBT_LEGAL_NOTICE: confirm
      QBT_VERSION: 5.1.2-2
      QBT_TORRENTING_PORT: 6881
      QBT_WEBUI_PORT: 8001
      UMASK: "002"
    stop_grace_period: 30m
    restart: unless-stopped
    networks:
      - jackbot

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: homeassistant
    ports:
      - "8123:8123"
    volumes:
      - ./volumes/homeassistant_config:/config
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: music-assistant
    # host networking is required for mDNS/zeroconf discovery (Spotify Connect,
    # AirPlay, Chromecast). Binds directly on the host: 8095 (web UI + API),
    # 1704/1705/1780 (snapcast), 8097 (stream server).
    network_mode: host
    volumes:
      - music-assistant-data:/data
    environment:
      <<: *timezone
    restart: unless-stopped

  filebrowser:
    image: filebrowser/filebrowser:v2
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: filebrowser
    user: ${PUID:-1654}:${PGID:-1654}
    ports:
      - "8002:80"
    volumes:
      - ${DATA_PATH:-./volumes/data}:/srv
      - ./volumes/filebrowser_database:/database
      - ./volumes/filebrowser_config:/config
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  jackett:
    image: lscr.io/linuxserver/jackett:0.24.306
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    container_name: jackett
    ports:
      - "8003:9117"
    volumes:
      - ./volumes/jackett_config:/config
      - ./volumes/jackett_data/downloads:/downloads
    environment:
      <<: *timezone
      PUID: ${PUID:-1654}
      PGID: ${PGID:-1654}
      UMASK: "022"
    restart: unless-stopped
    networks:
      - jackbot
        #    depends_on:
        #      - flaresolverr

  #  flaresolverr:
  #    image: ghcr.io/flaresolverr/flaresolverr:latest
  #    logging:
  #      options:
  #        max-size: "5m"
  #        max-file: "3"
  #    container_name: flaresolverr
  #    environment:
  #      - LOG_LEVEL=info
  #      - LOG_HTML=false
  #      - CAPTCHA_SOLVER=none
  #    ports:
  #      - "8191:8191"
  #    networks:
  #      - jackbot
  #    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:1.42.1
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: plex
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./volumes/plex_config:/config
      - ${DATA_PATH:-./volumes/data}:/media
    environment:
      <<: *timezone
      PUID: ${PUID:-1654}
      PGID: ${PGID:-1654}
      VERSION: docker
    restart: unless-stopped

  base-sdk:
    image: base-sdk:latest
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Dockerfile.base-sdk
      cache_from:
        - base-sdk:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
      labels:
        keep: "true"
    entrypoint: ["true"]
    environment:
      <<: *timezone
    restart: "no"
    networks:
      - jackbot

  mcp-library:
    image: mcp-library:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-library
    ports:
      - "6001:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerLibrary/Dockerfile
      cache_from:
        - mcp-library:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    volumes:
      - ${DATA_PATH:-./volumes/data}:/media
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      qbittorrent:
        condition: service_started
      jackett:
        condition: service_started
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-vault:
    image: mcp-vault:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-vault
    ports:
      - "6002:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerVault/Dockerfile
      cache_from:
        - mcp-vault:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    volumes:
      - ${VAULT_PATH:-./volumes/vault}:/vault
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-sandbox:
    image: mcp-sandbox:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-sandbox
    ports:
      - "6004:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerSandbox/Dockerfile
      cache_from:
        - mcp-sandbox:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    devices:
      - /dev/dri:/dev/dri
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    volumes:
      - ${SANDBOX_HOME_PATH:-./volumes/sandbox}:/home/sandbox_user
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
      HOME: /home/sandbox_user
      PATH: /home/sandbox_user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    networks:
      - jackbot
    depends_on:
      - base-sdk

  camoufox:
    image: camoufox:latest
    build:
      context: ./camoufox
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: camoufox
    ports:
      - "9377:9377"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9377/json"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  mcp-websearch:
    image: mcp-websearch:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-websearch
    ports:
      - "6003:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerWebSearch/Dockerfile
      cache_from:
        - mcp-websearch:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      camoufox:
        condition: service_healthy
      base-sdk:
        condition: service_started

  mcp-idealista:
    image: mcp-idealista:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-idealista
    ports:
      - "6005:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerIdealista/Dockerfile
      cache_from:
        - mcp-idealista:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-homeassistant:
    image: mcp-homeassistant:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-homeassistant
    ports:
      - "6006:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerHomeAssistant/Dockerfile
      cache_from:
        - mcp-homeassistant:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      homeassistant:
        condition: service_started

  mcp-channel-signalr:
    image: mcp-channel-signalr:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-signalr
    ports:
      - "6010:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelSignalR/Dockerfile
      cache_from:
        - mcp-channel-signalr:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-channel-telegram:
    image: mcp-channel-telegram:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-telegram
    ports:
      - "6011:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelTelegram/Dockerfile
      cache_from:
        - mcp-channel-telegram:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-channel-servicebus:
    image: mcp-channel-servicebus:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-servicebus
    ports:
      - "6012:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelServiceBus/Dockerfile
      cache_from:
        - mcp-channel-servicebus:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-scheduling:
    image: mcp-scheduling:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-scheduling
    ports:
      - "6013:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerScheduling/Dockerfile
      cache_from:
        - mcp-scheduling:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-printer:
    image: mcp-printer:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-printer
    ports:
      - "6014:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerPrinter/Dockerfile
      cache_from:
        - mcp-printer:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    volumes:
      - printer-spool:/spool
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started

  mcp-channel-voice:
    image: mcp-channel-voice:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-voice
    ports:
      - "6015:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelVoice/Dockerfile
      cache_from:
        - mcp-channel-voice:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    volumes:
      - ./volumes/voices:/voices
      - ./volumes/tse-audit:/tse-audit
    env_file:
      - .env
    environment:
      <<: *timezone
      Announce__Escalation__WebhookUrl: ""
      Tse__Mode: "${Tse__Mode:-Off}"
      Tse__Endpoint: "${Tse__Endpoint:-http://tse-extractor:9098}"
      Tse__TimeoutMs: "${Tse__TimeoutMs:-90000}"
      Tse__NoiseFloorThreshold: "${Tse__NoiseFloorThreshold:-400}"
      Tse__AuditDir: "${Tse__AuditDir:-}"
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy
      wyoming-whisper:
        condition: service_started
      wyoming-piper:
        condition: service_started

  wyoming-whisper:
    # Patched image: emits score/avg_logprob/no_speech_prob/compression_ratio on the
    # transcript event for the hub's confidence gate. See wyoming-whisper/README.md.
    build: ./wyoming-whisper
    image: jackbot-wyoming-whisper
    container_name: wyoming-whisper
    # base model on CPU. Silero VAD (--vad-filter) trims non-speech before decoding to cut
    # silence/noise hallucinations; beam-size 5 and a short Spanish initial-prompt bias
    # spelling/vocabulary. List form so the prompt's spaces stay a single argument.
    command:
      - --model
      - base
      - --language
      - es
      - --device
      - cpu
      # int8_float32 is an alternative
      - --compute-type
      - int8
      - --beam-size
      - "5"
      # Silero VAD trims non-speech before the decoder (fewer silence/noise hallucinations).
      # Threshold raised 0.5 -> 0.6 to reject borderline noise wakes (2026-07 gibberish
      # protection). Rollback signal: quiet/far speech getting "ignored" — dispatched-utterance
      # rate dropping without a matching rise in dropped/no-speech metrics — means lower it
      # back toward 0.5 and re-test.
      - --vad-filter
      - --vad-threshold
      - "0.6"
      - --initial-prompt
      - "Asistente de voz en español de España (castellano): domótica, recordatorios, listas de la compra, el tiempo y preguntas generales. Nombres propios y ciudades españolas, p. ej. Valladolid."
      - --uri
      - tcp://0.0.0.0:10300
    volumes:
      - ./volumes/whisper-data:/data
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot

  piper-voice-fetch:
    # Fetch Piper voices that won't land in the shared piper-data volume on their own, before
    # wyoming-piper starts:
    #   - es_ES-carlfm-high — unofficial (HF friyin/vits-piper-es_ES-carlfm-high), not in the catalog.
    #   - es_MX-claude-high — official Piper catalog voice (rhasspy/piper-voices).
    #   - es_MX-laura-high  — unofficial community voice (HF HirCoir/Piper-TTS-Laura).
    # wyoming-piper serves any voice present in /data; select one per request via the synthesize
    # voice name (--voice below is only the default). Idempotent: skips files already present, so it
    # no-ops on every `up` after the first. Runs as root because the volume is root-owned (populated
    # by the wyoming-piper container itself).
    image: curlimages/curl:latest
    container_name: piper-voice-fetch
    user: root
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        set -e
        d=/data
        fetch() {
          if [ -s "$$d/$$2" ]; then
            echo "piper-voice-fetch: $$2 already present"
          else
            echo "piper-voice-fetch: downloading $$2"
            # Best-effort + atomic: temp path moved on success so a truncated transfer never leaves a
            # partial file; a failed OPTIONAL-voice download logs and continues (the if-guard keeps
            # curl's non-zero exit from tripping `set -e` and blocking the whole stack from starting).
            if curl -fsSL --remove-on-error -o "$$d/$$2.tmp" "$$1/$$2"; then
              mv "$$d/$$2.tmp" "$$d/$$2"
            else
              echo "piper-voice-fetch: WARNING failed to download $$2 (optional voice), skipping" >&2
            fi
          fi
        }
        carlfm=https://huggingface.co/friyin/vits-piper-es_ES-carlfm-high/resolve/main
        fetch "$$carlfm" es_ES-carlfm-high.onnx
        fetch "$$carlfm" es_ES-carlfm-high.onnx.json
        claude=https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/es/es_MX/claude/high
        fetch "$$claude" es_MX-claude-high.onnx
        fetch "$$claude" es_MX-claude-high.onnx.json
        laura=https://huggingface.co/HirCoir/Piper-TTS-Laura/resolve/main
        fetch "$$laura" es_MX-laura-high.onnx
        fetch "$$laura" es_MX-laura-high.onnx.json
    volumes:
      - ./volumes/piper-data:/data
    environment:
      <<: *timezone
    restart: "no"
    networks:
      - jackbot

  wyoming-piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    command: --voice es_ES-davefx-medium --length-scale 1.05 --noise-w-scale 0.85 --noise-scale 0.667 --uri tcp://0.0.0.0:10200
    volumes:
      - ./volumes/piper-data:/data
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      piper-voice-fetch:
        condition: service_completed_successfully

  tse-extractor:
    image: tse-extractor:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: tse-extractor
    build:
      context: ./tse-extractor
    restart: unless-stopped
    ports:
      - "9098:9098"
    volumes:
      - ./volumes/tse-models:/models
      - ./volumes/voices:/voices:ro
    networks:
      - jackbot

  agent:
    image: agent:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: agent
    ports:
      - "5000:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Agent/Dockerfile
      cache_from:
        - agent:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    command: [ "--chat", "Web", "--reasoning" ]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *timezone
    networks:
      - jackbot
    depends_on:
      mcp-library:
        condition: service_started
      mcp-vault:
        condition: service_started
      mcp-sandbox:
        condition: service_started
      mcp-websearch:
        condition: service_started
      mcp-idealista:
        condition: service_started
      mcp-homeassistant:
        condition: service_started
      mcp-channel-signalr:
        condition: service_started
      mcp-channel-telegram:
        condition: service_started
      mcp-channel-servicebus:
        condition: service_started
      mcp-scheduling:
        condition: service_started
      mcp-printer:
        condition: service_started
      mcp-channel-voice:
        condition: service_started
      redis:
        condition: service_healthy
      base-sdk:
        condition: service_started

  webui:
    image: webui:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: webui
    ports:
      - "5001:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: WebChat/Dockerfile
      cache_from:
        - webui:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    env_file:
      - .env
    environment:
      <<: *timezone
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      - agent
      - base-sdk

  observability:
    image: observability:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: observability
    # music-assistant runs with network_mode: host (for mDNS/zeroconf discovery), so it
    # is not on the jackbot bridge and its container name no longer resolves. The health
    # probe reaches its host-published port via the host gateway instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Observability/Dockerfile
      cache_from:
        - observability:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "5003:8080"
    env_file:
      - .env
    environment:
      <<: *timezone
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jackbot

  caddy:
    build:
      context: ./caddy
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: caddy
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./volumes/caddy_data:/data
      - ./volumes/caddy_config:/config
    environment:
      <<: *timezone
      CF_API_TOKEN: ${CF_API_TOKEN}
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      - webui
      - agent

networks:
  jackbot:

volumes:
  printer-spool:
  music-assistant-data: