name: jackbot
services:
  redis:
    image: redis/redis-stack-server:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis_data:/data
    environment:
      - REDIS_ARGS=--appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jackbot

  qbittorrent:
    image: qbittorrentofficial/qbittorrent-nox:5.1.2-2
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: qbittorrent
    ports:
      - "8001:8001"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./volumes/qbittorrent_config:/config
      - ${DATA_PATH:-./volumes/data}/downloads:/downloads
    environment:
      - PUID=${PUID:-1654}
      - PGID=${PGID:-1654}
      - QBT_LEGAL_NOTICE=confirm
      - QBT_VERSION=5.1.2-2
      - QBT_TORRENTING_PORT=6881
      - QBT_WEBUI_PORT=8001
      - TZ=UTC
      - UMASK=002
    stop_grace_period: 30m
    restart: unless-stopped
    networks:
      - jackbot

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: homeassistant
    ports:
      - "8123:8123"
    volumes:
      - ./volumes/homeassistant_config:/config
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped
    networks:
      - jackbot

  filebrowser:
    image: filebrowser/filebrowser:v2
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: filebrowser
    user: ${PUID:-1654}:${PGID:-1654}
    ports:
      - "8002:80"
    volumes:
      - ${DATA_PATH:-./volumes/data}:/srv
      - ./volumes/filebrowser_database:/database
      - ./volumes/filebrowser_config:/config
    restart: unless-stopped
    networks:
      - jackbot

  jackett:
    image: lscr.io/linuxserver/jackett:0.24.306
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    container_name: jackett
    ports:
      - "8003:9117"
    volumes:
      - ./volumes/jackett_config:/config
      - ./volumes/jackett_data/downloads:/downloads
    environment:
      - PUID=${PUID:-1654}
      - PGID=${PGID:-1654}
      - TZ=UTC
      - UMASK=022
    restart: unless-stopped
    networks:
      - jackbot
        #    depends_on:
        #      - flaresolverr
        
  #  flaresolverr:
  #    image: ghcr.io/flaresolverr/flaresolverr:latest
  #    logging:
  #      options:
  #        max-size: "5m"
  #        max-file: "3"
  #    container_name: flaresolverr
  #    environment:
  #      - LOG_LEVEL=info
  #      - LOG_HTML=false
  #      - CAPTCHA_SOLVER=none
  #      - TZ=UTC
  #    ports:
  #      - "8191:8191"
  #    networks:
  #      - jackbot
  #    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:1.42.1
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: plex
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./volumes/plex_config:/config
      - ${DATA_PATH:-./volumes/data}:/media
    environment:
      - PUID=${PUID:-1654}
      - PGID=${PGID:-1654}
      - TZ=UTC
      - VERSION=docker
    restart: unless-stopped
    
  base-sdk:
    image: base-sdk:latest
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Dockerfile.base-sdk
      cache_from:
        - base-sdk:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
      labels:
        keep: "true"
    entrypoint: ["true"]
    restart: "no"
    networks:
      - jackbot

  mcp-library:
    image: mcp-library:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-library
    ports:
      - "6001:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerLibrary/Dockerfile
      cache_from:
        - mcp-library:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    volumes:
      - ${DATA_PATH:-./volumes/data}/downloads:/downloads
      - ${DATA_PATH:-./volumes/data}:/media
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      - qbittorrent
      - jackett
      - base-sdk

  mcp-vault:
    image: mcp-vault:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-vault
    ports:
      - "6002:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerVault/Dockerfile
      cache_from:
        - mcp-vault:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    volumes:
      - ${VAULT_PATH:-./volumes/vault}:/vault
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-sandbox:
    image: mcp-sandbox:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-sandbox
    ports:
      - "6004:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerSandbox/Dockerfile
      cache_from:
        - mcp-sandbox:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    user: ${PUID:-1654}:${PGID:-1654}
    devices:
      - /dev/dri:/dev/dri
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    volumes:
      - ${SANDBOX_HOME_PATH:-./volumes/sandbox}:/home/sandbox_user
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/sandbox_user
      PATH: /home/sandbox_user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    networks:
      - jackbot
    depends_on:
      - base-sdk

  camoufox:
    build: ./camoufox
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: camoufox
    ports:
      - "9377:9377"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9377/json"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - jackbot

  mcp-websearch:
    image: mcp-websearch:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-websearch
    ports:
      - "6003:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerWebSearch/Dockerfile
      cache_from:
        - mcp-websearch:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      camoufox:
        condition: service_healthy
      base-sdk:
        condition: service_started

  mcp-idealista:
    image: mcp-idealista:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-idealista
    ports:
      - "6005:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerIdealista/Dockerfile
      cache_from:
        - mcp-idealista:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      - base-sdk

  mcp-homeassistant:
    image: mcp-homeassistant:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-homeassistant
    ports:
      - "6006:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpServerHomeAssistant/Dockerfile
      cache_from:
        - mcp-homeassistant:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      homeassistant:
        condition: service_started

  mcp-channel-signalr:
    image: mcp-channel-signalr:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-signalr
    ports:
      - "6010:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelSignalR/Dockerfile
      cache_from:
        - mcp-channel-signalr:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-channel-telegram:
    image: mcp-channel-telegram:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-telegram
    ports:
      - "6011:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelTelegram/Dockerfile
      cache_from:
        - mcp-channel-telegram:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      base-sdk:
        condition: service_started
      redis:
        condition: service_healthy

  mcp-channel-servicebus:
    image: mcp-channel-servicebus:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: mcp-channel-servicebus
    ports:
      - "6012:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: McpChannelServiceBus/Dockerfile
      cache_from:
        - mcp-channel-servicebus:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      - base-sdk

  agent:
    image: agent:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: agent
    ports:
      - "5000:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Agent/Dockerfile
      cache_from:
        - agent:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    command: [ "--chat", "Web", "--reasoning" ]
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - jackbot
    depends_on:
      mcp-library:
        condition: service_started
      mcp-vault:
        condition: service_started
      mcp-sandbox:
        condition: service_started
      mcp-websearch:
        condition: service_started
      mcp-idealista:
        condition: service_started
      mcp-homeassistant:
        condition: service_started
      mcp-channel-signalr:
        condition: service_started
      mcp-channel-telegram:
        condition: service_started
      mcp-channel-servicebus:
        condition: service_started
      redis:
        condition: service_healthy
      base-sdk:
        condition: service_started

  webui:
    image: webui:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: webui
    ports:
      - "5001:8080"
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: WebChat/Dockerfile
      cache_from:
        - webui:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      - agent
      - base-sdk

  observability:
    image: observability:latest
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: observability
    build:
      context: ${REPOSITORY_PATH}
      dockerfile: Observability/Dockerfile
      cache_from:
        - observability:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "5003:8080"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jackbot

  caddy:
    build:
      context: ./caddy
    logging:
      options:
        max-size: "5m"
        max-file: "3"
    container_name: caddy
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./volumes/caddy_data:/data
      - ./volumes/caddy_config:/config
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
    restart: unless-stopped
    networks:
      - jackbot
    depends_on:
      - webui
      - agent

networks:
  jackbot:
