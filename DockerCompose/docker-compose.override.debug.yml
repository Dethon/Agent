services:
  base-sdk:
    build:
      args:
        - BUILD_CONFIGURATION=Debug

  agent:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    environment:
      - DOTNET_ENVIRONMENT=Development
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  webui:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  observability:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-library:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-vault:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-sandbox:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-websearch:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-idealista:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-homeassistant:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-channel-signalr:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-channel-telegram:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-channel-servicebus:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-channel-voice:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    # Satellite topology for local debug. appsettings.Development.json is excluded
    # from the image by .dockerignore (**/appsettings.Development.json), so the hub
    # gets its satellites from env here instead. The hub dials out to the satellite's
    # Wyoming server; a WSL wyoming-satellite (scripts/wsl-satellite.sh) is reached
    # via host.docker.internal:10800.
    environment:
      - DOTNET_ENVIRONMENT=Development
      - Voice__Satellites__kitchen-01__Identity=household
      - Voice__Satellites__kitchen-01__Room=Kitchen
      - Voice__Satellites__kitchen-01__WakeWord=hey_jarvis
      - Voice__Satellites__kitchen-01__Address=tcp://host.docker.internal:10800
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-scheduling:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  mcp-printer:
    build:
      args:
        - BUILD_CONFIGURATION=Debug
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - vsdbg:/remote_debugger:ro

  vsdbg-install:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - vsdbg:/vsdbg
    command: >
      bash -c "curl -sSL https://aka.ms/getvsdbgsh | bash /dev/stdin -v latest -l /vsdbg"
    profiles:
      - setup

volumes:
  vsdbg:
